version: "1"
projects:
- name: My project
  environments:
  - name: Production
    services:
    - type: web
      name: smartseason-frontend
      runtime: static
      repo: https://github.com/onyangolamek7/smartseason.v2
      envVars:
      - key: VITE_API_URL
        sync: false
      buildCommand: npm install; npx vite build
      staticPublishPath: dist
      routes:
      - type: rewrite
        source: /*
        destination: /index.html
      autoDeployTrigger: commit
      rootDir: frontend
